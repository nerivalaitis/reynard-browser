name: Build and Release

on:
  workflow_dispatch:
    inputs:
      create_nightly:
        description: 'Create nightly release'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    outputs:
      artifact: ${{ steps.upload-artifact.outputs.artifact }}
    steps:
      - name: Prepare workspace
        shell: bash
        run: |
          current="${GITHUB_WORKSPACE}"
          while [ -n "${current}" ] && [ "${current}" != "/" ]; do
            echo "::add-mask::${current}"
            current=$(dirname "${current}")
          done

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Checkout Firefox submodule
        run: git submodule update --init --depth 1 --recursive engine/firefox

      - name: Checkout idevice submodule
        run: git submodule update --init --depth 1 --recursive support/idevice

      - name: Update Gecko
        run: ./tools/development/update-gecko.sh

      - name: Apply Gecko patches
        run: ./tools/development/apply-patches.sh

      - name: Select Xcode
        run: |
          echo "Available Xcode installations:"
          find /Applications -maxdepth 1 -name 'Xcode*.app' | sort -V
          XCODE_PATH=$(find /Applications -maxdepth 1 -name 'Xcode*.app' | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode.app found in /Applications" && exit 1
          fi
          echo "Selected: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
          echo "xcode-select -p: $(xcode-select -p)"
          echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-path)"
          echo "macOS SDK: $(xcrun --sdk macosx --show-sdk-path)"

      - name: Set up Rust environment
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install LLVM lld linker
        run: |
          brew install llvm
          LLVM_BIN="$(brew --prefix llvm)/bin"
          TOOLCHAIN_BIN="$(dirname "$(xcrun --find clang)")"
          echo "Symlinking lld into $TOOLCHAIN_BIN"
          sudo ln -sf "$LLVM_BIN/ld64.lld" "$TOOLCHAIN_BIN/ld64.lld"
          sudo ln -sf "$LLVM_BIN/ld.lld" "$TOOLCHAIN_BIN/ld.lld"
          sudo ln -sf "$LLVM_BIN/lld" "$TOOLCHAIN_BIN/lld"
          echo "Verifying: $(ls -la "$TOOLCHAIN_BIN/ld64.lld")"

      - name: Build idevice
        run: ./tools/development/build-idevice.sh

      - name: Build the app
        run: ./tools/release/build-app.sh

      - name: Create .ipa file
        run: ./tools/release/create-ipa.sh

      - name: Tar build artifact
        run: tar -czf ./dist/Reynard.xcarchive.tar.gz -C ./dist Reynard.xcarchive

      - name: Upload build artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reynard.xcarchive
          path: ./dist/Reynard.xcarchive.tar.gz

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reynard.ipa
          path: ./dist/Reynard.ipa

      - name: Clean up workspace
        if: always()
        shell: bash
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          fi

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.create_nightly && github.event.inputs.create_nightly == 'true'
    permissions:
      contents: write
    steps:
      - name: Prepare workspace
        shell: bash
        run: |
          current="${GITHUB_WORKSPACE}"
          while [ -n "${current}" ] && [ "${current}" != "/" ]; do
            echo "::add-mask::${current}"
            current=$(dirname "${current}")
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Download .ipa artifact
        uses: actions/download-artifact@v4
        with:
          name: Reynard.ipa
          path: ./dist

      - name: Get information for release
        id: version
        run: |
          CURRENT_VERSION=$(grep 'CURRENT_VERSION' ./browser/Configuration/Reynard.xcconfig | cut -d '=' -f2 | tr -d ' ')
          CURRENT_BUILD=$(date +%Y%b%d | tr '[:lower:]' '[:upper:]')
          ENGINE_REVISION=$(cat ./engine/release.txt)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "current_build=$CURRENT_BUILD" >> $GITHUB_OUTPUT
          echo "engine_revision=$ENGINE_REVISION" >> $GITHUB_OUTPUT

      - name: Create nightly release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          name: Nightly
          allowUpdates: true
          removeArtifacts: true
          body: |
            **Build:** ${{ steps.version.outputs.current_build }}
            **Version:** ${{ steps.version.outputs.current_version }}
            **Engine:** [${{ steps.version.outputs.engine_revision }}](https://github.com/mozilla-firefox/firefox/commit/${{ steps.version.outputs.engine_revision }})
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            This is a nightly release [created automatically with GitHub Actions workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}).

            Before using this release, please read the installation instruction in the README at [#Installation](https://github.com/minh-ton/reynard-browser#installation).
          artifacts: ./dist/Reynard.ipa

      - name: Clean up workspace
        if: always()
        shell: bash
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          fi